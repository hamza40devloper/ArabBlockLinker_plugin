name: Build OmniTranslate JAR

# تشغيل البناء تلقائياً عند دفع كود جديد للـ main أو تشغيله يدوياً
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. جلب الكود من المستودع
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. إعداد بيئة الجافا (Java 17 المتوافقة مع ماينكرافت 1.20)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    # 3. بناء البلوجين عبر Maven وتوليد ملف الـ JAR
    - name: Build with Maven
      run: mvn clean package

    # 4. رفع ملف الـ JAR النهائي ليكون قابلاً للتحميل من موقع GitHub
    - name: Upload Compiled JAR
      uses: actions/upload-artifact@v4
      with:
        name: OmniTranslate-Plugin
        path: target/OmniTranslate-1.0-MVP.jar
