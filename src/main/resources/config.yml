# OmniTranslate Configuration File
settings:
  # نوع الأداة الافتراضية
  tool-material: "COMPASS"
  tool-name: "&#00f2ff&lOmniTranslate Tool"
  tool-lore:
    - "&7Click to open translation menu."
    - "&d&lPersistent &7- Cannot be dropped."
  
  # نظام الكاش (التخزين المؤقت) بالدقائق
  cache-expiry-minutes: 30

# إعدادات واجهة اللغات (GUI) بالزجاج المسطح
gui:
  title: "Select Your Language"
  languages:
    ARABIC:
      material: "RED_STAINED_GLASS_PANE"
      slot: 11
      display-name: "&cالعربية"
    ENGLISH:
      material: "BLUE_STAINED_GLASS_PANE"
      slot: 13
      display-name: "&bEnglish"
    SPANISH:
      material: "YELLOW_STAINED_GLASS_PANE"
      slot: 15
      display-name: "&eEspañol"

# نظام الحماية والربط مع ديسكورد
discord-security:
  webhook-url: "YOUR_DISCORD_WEBHOOK_URL_HERE"
  suspicious-keywords:
    - "hax"
    - "cheat"
    - "fuck"
    - "noob"

# إعدادات النص فوق الرأس (Text Display)
text-display:
  view-distance: 15
  background-color: "000000" # ARGB Hex format
